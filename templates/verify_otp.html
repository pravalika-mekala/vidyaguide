<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP | VidyaGuide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script>
    (function() {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark' || !theme) {
        document.documentElement.classList.add('dark-theme');
      }
    })();
  </script>
</head>
<body>
  <script>
    (function() {
      const theme = localStorage.getItem('theme');
      if (theme === 'light') {
        document.documentElement.classList.remove('dark-theme');
      }
    })();
  </script>
  <div class="app-bg"></div>
  <div class="position-fixed top-0 end-0 p-3" style="z-index: 1050;">
    <button id="theme-toggle" class="btn btn-sm btn-outline-light border-0 px-2" title="Toggle Theme" style="background: rgba(255,255,255,0.05); backdrop-filter: blur(4px);">
      <span class="theme-icon">🌓</span>
    </button>
  </div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="hero-card">
          <h2 class="fw-bold mb-1">Verify OTP</h2>
          <p class="muted mb-2">OTP sent to: <strong>{{ email }}</strong></p>
          <p class="muted mb-4">Enter OTP and create a new password.</p>

          {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
          {% endif %}
          {% if success %}
          <div class="alert alert-success">{{ success }}</div>
          {% endif %}

          <form action="/forgot-password/verify" method="post" class="d-grid gap-3">
            <div>
              <label class="form-label">OTP</label>
              <input type="text" name="otp" class="form-control" maxlength="6" pattern="[0-9]{6}" placeholder="6-digit OTP" required>
            </div>
            <div>
              <label class="form-label">New Password</label>
              <div class="input-group">
                <input id="new_password" type="password" name="password" class="form-control" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('new_password', this)">Show</button>
              </div>
            </div>
            <div>
              <label class="form-label">Confirm New Password</label>
              <div class="input-group">
                <input id="confirm_new_password" type="password" name="confirm_password" class="form-control" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirm_new_password', this)">Show</button>
              </div>
            </div>
            <button class="btn btn-brand w-100">Verify OTP & Reset</button>
          </form>

          <div class="text-center mt-3">
            <a href="/forgot-password" class="text-decoration-none">Request new OTP</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      if (!input) return;
      if (input.type === "password") {
        input.type = "text";
        button.textContent = "Hide";
      } else {
        input.type = "password";
        button.textContent = "Show";
      }
    }
  </script>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark-theme');
      
      if (isDark) {
        html.classList.remove('dark-theme');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark-theme');
        localStorage.setItem('theme', 'dark');
      }
    }
    document.getElementById('theme-toggle')?.addEventListener('click', toggleTheme);
  </script>
</body>
</html>
