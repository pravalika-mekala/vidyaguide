<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | VidyaGuide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script>
    (function() {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark' || !theme) {
        document.documentElement.classList.add('dark-theme');
      }
    })();
  </script>
</head>
<body>
  <script>
    (function() {
      const theme = localStorage.getItem('theme');
      if (theme === 'light') {
        document.documentElement.classList.remove('dark-theme');
      }
    })();
  </script>
  <div class="app-bg"></div>
  <div class="position-fixed top-0 end-0 p-3" style="z-index: 1050;">
    <button id="theme-toggle" class="btn btn-sm btn-outline-light border-0 px-2" title="Toggle Theme" style="background: rgba(255,255,255,0.05); backdrop-filter: blur(4px);">
      <span class="theme-icon">🌓</span>
    </button>
  </div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="hero-card">
          <h2 class="fw-bold mb-1">Welcome back</h2>
          <p class="muted mb-4">Sign in to continue your career journey.</p>

          {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
          {% endif %}
          {% if success %}
          <div class="alert alert-success">{{ success }}</div>
          {% endif %}

          <form action="/login" method="post" class="d-grid gap-3">
            <div>
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div>
              <label class="form-label">Password</label>
              <div class="input-group">
                <input type="password" name="password" id="login-password" class="form-control" required>
                <button class="btn btn-outline-secondary" type="button" id="togglePassword">Show</button>
              </div>
            </div>
            <button class="btn btn-brand w-100">Login</button>
          </form>

          <div class="text-center mt-3">
            <a href="/forgot-password" class="text-decoration-none d-block mb-2">Forgot Password?</a>
            <a href="/signup" class="text-decoration-none">Create account</a>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark-theme');
      
      if (isDark) {
        html.classList.remove('dark-theme');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark-theme');
        localStorage.setItem('theme', 'dark');
      }
    }
    document.getElementById('theme-toggle')?.addEventListener('click', toggleTheme);

    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('login-password');
    togglePassword?.addEventListener('click', function() {
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      this.textContent = type === 'password' ? 'Show' : 'Hide';
    });
  </script>
</body>
</html>
